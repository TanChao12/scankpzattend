<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registration Scanner</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .scanner-container {
            width: 100%;
            max-width: 450px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-top: 2rem;
            position: relative;
        }
        #reader {
            width: 100%;
            min-height: 300px;
        }
        #reader video {
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container text-center pt-4">
        <h3 class="fw-bold text-dark mb-1">Attendance Scanner</h3>
        <p class="text-muted small">Scan Student Matric Number QR</p>
        
        <div class="scanner-container p-2">
            <div id="reader"></div>
        </div>

        <div class="mt-4">
            <button id="btn-restart" class="btn btn-primary d-none w-100 shadow-sm" style="max-width: 300px; padding: 12px;">
                Scan Next Student
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // --- ARCHITECTURE CONFIGURATION ---
        // Paste your deployed Google Apps Script Web App URL here
        const API_ENDPOINT = "https://script.google.com/macros/s/AKfycbxUmmHNwtZZrG7Mne2agldcrx5HEQUIdigQm_ClQqIQy0aim5b8LoNRPmk5BXXk2pSUtw/exec";
        
        const html5QrCode = new Html5Qrcode("reader");
        const btnRestart = document.getElementById("btn-restart");

        function startScanner() {
            btnRestart.classList.add("d-none");
            
            const config = { 
                fps: 10, 
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            html5QrCode.start(
                { facingMode: "environment" }, 
                config, 
                onScanSuccess, 
                (error) => {} // Suppress noisy failure logs
            ).catch(err => {
                Swal.fire('Camera Error', 'Unable to access the device camera.', 'error');
            });
        }

        function onScanSuccess(decodedText) {
            html5QrCode.stop().then(() => {
                btnRestart.classList.remove("d-none");
                
                Swal.fire({
                    title: 'Verifying...',
                    text: `Checking database for: ${decodedText}`,
                    allowOutsideClick: false,
                    didOpen: () => { Swal.showLoading(); }
                });

                updateGoogleSheet(decodedText);
            });
        }

        function updateGoogleSheet(matricNumber) {
    // Append the matric number as a query string parameter
    const fetchUrl = `${API_ENDPOINT}?matricNumber=${encodeURIComponent(matricNumber)}`;

    // A standard GET request bypasses POST CORS preflight issues entirely
    fetch(fetchUrl)
    .then(response => {
        if (!response.ok) throw new Error("Network response was not ok");
        return response.json();
    })
    .then(data => {
        if (data.status === "success") {
            Swal.fire({
                icon: 'success',
                title: 'Verified!',
                text: data.message,
                timer: 2500,
                showConfirmButton: false
            });
        } else {
            Swal.fire({
                icon: 'error',
                title: 'Record Not Found',
                text: data.message
            });
        }
    })
    .catch(error => {
        console.error("Fetch error:", error);
        Swal.fire({
            icon: 'error',
            title: 'Network Error',
            text: 'Failed to communicate with the server. Ensure the App Script is deployed publicly.'
        });
    });
}

        btnRestart.addEventListener("click", startScanner);
        document.addEventListener("DOMContentLoaded", startScanner);

    </script>
</body>
</html>
